{% extends "base.html" %}

{% block title %}{{ _('Change Password') }} - {{ _('Cyber Security Automation') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">{{ _('Change Password') }}</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">{{ _('Current Password') }}</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('New Password') }}</label>
                        <input type="password" name="new_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Confirm New Password') }}</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button class="btn btn-primary w-100">{{ _('Change Password') }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
