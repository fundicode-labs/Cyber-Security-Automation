{% extends "base.html" %}

{% block title %}{{ _('Add User') }} - {{ _('Cyber Security Automation') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">{{ _('Add New User') }}</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">{{ _('Username') }}</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Email') }}</label>
                        <input type="email" name="email" class="form-control" placeholder="{{ _('you@example.com') }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Password') }}</label>
                        <input type="password" name="password" class="form-control" required>
                        <div class="form-text">{{ _('Use at least 6 characters for admin-created accounts.') }}</div>
                    </div>
                    <button type="submit" class="btn btn-success">{{ _('Add User') }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
