{% extends "base.html" %}

{% block title %}{{ _('Login') }} - {{ _('Cyber Security Automation') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">{{ _('Login') }}</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">{{ _('Username') }}</label>
                        <input type="text" name="username" class="form-control" placeholder="{{ _('Enter username') }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Password') }}</label>
                        <input type="password" name="password" class="form-control" placeholder="{{ _('Enter password') }}" required>
                    </div>
                    <button class="btn btn-primary w-100">{{ _('Login') }}</button>
                </form>
                <div class="text-center mt-4">
                    <span class="text-muted">{{ _('New here?') }}</span>
                    <a href="/register" class="text-decoration-none ms-1">{{ _('Create a professional account') }}</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
